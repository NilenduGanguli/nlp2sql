# =============================================================================
# KnowledgeQL — Full-Stack Docker Compose
#
# Services:
#   oracle  — Oracle Free 23c database (gvenzl/oracle-free)
#   backend — KnowledgeQL FastAPI backend; serves React SPA + /api/* (port 8000)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up              # full stack
#   docker compose -f docker/docker-compose.yml up oracle       # DB only
#   docker compose -f docker/docker-compose.yml logs -f backend # tail logs
#   docker compose -f docker/docker-compose.yml down -v         # teardown
# =============================================================================

services:

  # ── Oracle Free 23c ─────────────────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: nlp2sql_oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: kyc
      APP_USER_PASSWORD: KycPassword1
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 20s
      retries: 15
      start_period: 120s

  # ── KnowledgeQL FastAPI Backend (also serves React SPA) ─────────────────────
  backend:
    build:
      context: ..            # project root
      dockerfile: Dockerfile.backend
    image: knowledgeql-backend:latest
    container_name: nlp2sql_backend
    depends_on:
      oracle:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      ORACLE_DSN: oracle:1521/FREEPDB1
      ORACLE_USER: kyc
      ORACLE_PASSWORD: KycPassword1
      ORACLE_TARGET_SCHEMAS: KYC
      ORACLE_THICK_MODE: "false"
      ORACLE_USE_DBA_VIEWS: "false"
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /app/secret_nlp2sql-491115-200db3f6447d.json
      GRAPH_CACHE_PATH: /data/graph_cache
      GRAPH_CACHE_VERSION: "1"
      GRAPH_CACHE_TTL_HOURS: "0"
    volumes:
      - /Users/neelu/dev/nlp2sql-491115-200db3f6447d.json:/app/secret_nlp2sql-491115-200db3f6447d.json:ro
      - graph_cache_data:/data/graph_cache
    restart: on-failure:3

volumes:
  oracle_data:
  graph_cache_data:

